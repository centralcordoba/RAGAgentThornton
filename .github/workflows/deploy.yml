# =============================================================================
# RegWatch AI — CI/CD Pipeline
# Trigger: push to main
# Jobs: test → build → deploy
# =============================================================================

name: Deploy RegWatch AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  API_IMAGE: regwatch-api
  WEB_IMAGE: regwatch-web

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Test
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: test

  # ---------------------------------------------------------------------------
  # Job 2: Build & Push Docker images
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set image tag
        run: echo "IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Build & push API image
        run: |
          docker build \
            --target production \
            -f apps/api/Dockerfile \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE }}:latest \
            .
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE }} --all-tags

      - name: Build & push Web image
        run: |
          docker build \
            --target production \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.API_PUBLIC_URL }} \
            -f apps/web/Dockerfile \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.WEB_IMAGE }}:latest \
            .
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.WEB_IMAGE }} --all-tags

  # ---------------------------------------------------------------------------
  # Job 3: Deploy to Azure Container Apps
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        run: echo "IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Deploy API Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ca-api-regwatch-prod
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Deploy Web Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ca-web-regwatch-prod
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Verify API health
        run: |
          API_URL=$(az containerapp show \
            -g ${{ env.RESOURCE_GROUP }} \
            -n ca-api-regwatch-prod \
            --query properties.configuration.ingress.fqdn -o tsv)
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${API_URL}/api/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "API health check passed"
              exit 0
            fi
            echo "Waiting for API... (attempt $i, status: $STATUS)"
            sleep 10
          done
          echo "API health check failed"
          exit 1
