##############################################################################
# RegWatch AI — Local Development Stack
# Usage: docker compose up -d
# Requires: .env.local (copy from .env.example)
##############################################################################

services:
  # --------------------------------------------------------------------------
  # API — Express + TypeScript
  # --------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: regwatch-api
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env.local
    environment:
      NODE_ENV: development
      PORT: "3000"
      DATABASE_URL: postgresql://regwatch:regwatch_dev@postgres:5432/regwatch_db
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j_dev_password
      REDIS_URL: redis://redis:6379
      SERVICE_BUS_CONNECTION_STRING: ${SERVICE_BUS_CONNECTION_STRING:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_GPT_DEPLOYMENT: ${AZURE_OPENAI_GPT_DEPLOYMENT:-gpt-4o}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-text-embedding-3-large}
      AZURE_SEARCH_ENDPOINT: ${AZURE_SEARCH_ENDPOINT:-}
      AZURE_SEARCH_API_KEY: ${AZURE_SEARCH_API_KEY:-}
      AZURE_SEARCH_INDEX_NAME: ${AZURE_SEARCH_INDEX_NAME:-regulatory-documents}
      AZURITE_CONNECTION_STRING: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1
      JWT_SECRET: dev-secret-change-in-production
      LOG_LEVEL: debug
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
      - ./packages:/app/packages:ro
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => { if (!r.ok) process.exit(1) })"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - regwatch

  # --------------------------------------------------------------------------
  # Web — Next.js 14
  # --------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: regwatch-web
    ports:
      - "${WEB_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:${PORT:-3000}
    volumes:
      - ./apps/web/app:/app/apps/web/app:ro
      - ./apps/web/components:/app/apps/web/components:ro
      - ./apps/web/lib:/app/apps/web/lib:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001').then(r => { if (!r.ok) process.exit(1) })"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - regwatch

  # --------------------------------------------------------------------------
  # PostgreSQL
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: regwatch-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: regwatch
      POSTGRES_PASSWORD: regwatch_dev
      POSTGRES_DB: regwatch_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regwatch -d regwatch_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - regwatch

  # --------------------------------------------------------------------------
  # Neo4j — Knowledge Graph
  # --------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: regwatch-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/neo4j_dev_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "neo4j status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - regwatch

  # --------------------------------------------------------------------------
  # Redis — Cache (RAG, embeddings, throttling)
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: regwatch-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - regwatch

  # --------------------------------------------------------------------------
  # Azurite — Azure Storage Emulator
  # --------------------------------------------------------------------------
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: regwatch-azurite
    ports:
      - "10000:10000"  # Blob
      - "10001:10001"  # Queue
      - "10002:10002"  # Table
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --loose
    volumes:
      - azurite_data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 10000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - regwatch

# ----------------------------------------------------------------------------
# Volumes
# ----------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  redis_data:
    driver: local
  azurite_data:
    driver: local

# ----------------------------------------------------------------------------
# Networks
# ----------------------------------------------------------------------------
networks:
  regwatch:
    driver: bridge
